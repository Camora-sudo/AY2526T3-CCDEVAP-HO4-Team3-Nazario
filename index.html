<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HO4: CSS Framework and JS Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    </head>
    <body>

    <div class="container py-4">
        <div class="text-center mb-4">
            <h1 class="fw-bold">FoodSafe</h1>
            <p class="text-muted">by Clarisse Nazario of S15 Team 3</p>
        </div>
        <div class="row g-4">
 
            <div class="col-12 col-lg-4">
            <div class="card chart-card">
                <div class="card-body">
                <h5 class="card-title">Passed Inspection Trends</h5>
                <canvas id="passedInspectionChart"></canvas>
                </div>
            </div>
            </div>

            <div class="col-12 col-lg-4">
            <div class="card chart-card">
                <div class="card-body">
                <h5 class="card-title">Ratio of Violations</h5>
                <canvas id="violationsChart"></canvas>
                </div>
            </div>
            </div>

            <div class="col-12 col-lg-4">
            <div class="card chart-card">
                <div class="card-body">
                <h5 class="card-title">Passed vs Failed Inspections (2026)</h5>
                <canvas id="passFailChart"></canvas>
                </div>
            </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="charts.js"></script>

    </body>
</html>
